SteamAuthDto:
  type: object
  properties:
    username:
      type: string
    password:
      type: string

SteamLoginRequestDto:
  type: object
  required: [username, password]
  properties:
    username:
      type: string
    password:
      type: string
    steamGuardCode:
      type: string

SteamLoginResultDto:
  type: object
  properties:
    result:
      $ref: './common.yaml#/SteamLoginResult'
    authType:
      $ref: './common.yaml#/AuthType'
    message:
      type: string

SteamAuthStatusDto:
  type: object
  properties:
    isConfigured:
      type: boolean
    sessionStatus:
      $ref: './common.yaml#/SessionStatus'
    lastCheckedAt:
      type: string
      format: date-time
