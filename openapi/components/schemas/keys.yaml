Arma3KeyDto:
  type: object
  properties:
    name:
      type: string
    fileSize:
      type: integer
      format: int64
    createdOn:
      type: string
      format: date-time

Arma3KeysDto:
  type: object
  properties:
    keys:
      type: array
      items:
        $ref: '#/Arma3KeyDto'

Arma3ProvidedKeyDto:
  type: object
  properties:
    name:
      type: string
    source:
      type: string

Arma3ProvidedKeysDto:
  type: object
  properties:
    keys:
      type: array
      items:
        $ref: '#/Arma3ProvidedKeyDto'
