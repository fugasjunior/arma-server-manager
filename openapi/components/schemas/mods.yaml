ModDto:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    serverType:
      $ref: './common.yaml#/ServerType'
    fileSize:
      type: integer
      format: int64
    lastUpdated:
      type: string
    installationStatus:
      type: string
    errorStatus:
      type: string
    loadOnClient:
      type: boolean
    loadOnServer:
      type: boolean
    loadOnHeadlessClient:
      type: boolean

ModsDto:
  type: object
  properties:
    workshopMods:
      type: array
      items:
        $ref: '#/ModDto'
    creatorDlcs:
      type: array
      items:
        $ref: '#/CreatorDlcDto'

CreatorDlcDto:
  type: object
  properties:
    id:
      type: string
    name:
      type: string

ModFlagsDto:
  required:
    - loadOnClient
    - loadOnServer
    - loadOnHeadlessClient
  properties:
    loadOnClient:
      type: boolean
    loadOnServer:
      type: boolean
    loadOnHeadlessClient:
      type: boolean

