CreatePresetRequestDto:
  type: object
  required: [name, mods, type]
  properties:
    name:
      type: string
      minLength: 1
    mods:
      type: array
      minItems: 1
      items:
        type: integer
        format: int64
    type:
      $ref: './common.yaml#/ServerType'

UpdatePresetRequestDto:
  type: object
  required: [name, mods]
  properties:
    name:
      type: string
      minLength: 1
    mods:
      type: array
      minItems: 1
      items:
        type: integer
        format: int64

PresetResponseDto:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    mods:
      type: array
      items:
        $ref: '#/PresetResponseModDto'
    type:
      $ref: './common.yaml#/ServerType'

PresetResponseModDto:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    shortName:
      type: string

PresetListResponseDto:
  type: object
  properties:
    presets:
      type: array
      items:
        $ref: '#/PresetResponseDto'
