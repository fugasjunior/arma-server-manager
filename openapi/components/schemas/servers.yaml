ConfigOverrideDto:
  type: object
  properties:
    configKey:
      type: string
      description: Config file key
    advanced:
      type: boolean
      description: True when this override exists (existence flag)
    content:
      type: string
      nullable: true
      description: Raw config content. Present only for callers with both ADVANCED_CONFIG_EDIT and SERVER_SECRETS_VIEW permissions.

ServerDto:
  type: object
  required: [type]
  discriminator:
    propertyName: type
    mapping:
      ARMA3: '#/Arma3ServerDto'
      DAYZ: '#/DayZServerDto'
      DAYZ_EXP: '#/DayZServerDto'
      REFORGER: '#/ReforgerServerDto'
  oneOf:
    - $ref: '#/Arma3ServerDto'
    - $ref: '#/DayZServerDto'
    - $ref: '#/ReforgerServerDto'

BaseServerDto:
  type: object
  required: [type]
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
      minLength: 1
    description:
      type: string
    port:
      type: integer
      minimum: 1
    queryPort:
      type: integer
      minimum: 1
    maxPlayers:
      type: integer
      minimum: 1
    type:
      type: string
    password:
      type: string
    adminPassword:
      type: string
    additionalOptions:
      type: string
    customLaunchParameters:
      type: array
      items:
        $ref: './common.yaml#/LaunchParameterDto'
    autoStart:
      type: boolean
    automaticRestart:
      $ref: './common.yaml#/AutomaticRestartDto'
    configOverrides:
      type: array
      items:
        $ref: '#/ConfigOverrideDto'

Arma3ServerDto:
  allOf:
    - $ref: '#/BaseServerDto'
    - type: object
      properties:
        clientFilePatching:
          type: boolean
        serverFilePatching:
          type: boolean
        persistent:
          type: boolean
        battlEye:
          type: boolean
        vonEnabled:
          type: boolean
        verifySignatures:
          type: boolean
        activeMods:
          type: array
          description: >
            Active mods for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in launch parameters (-mod=, -serverMod=).
          items:
            $ref: '#/ServerWorkshopModDto'
        activeLocalMods:
          type: array
          description: >
            Active local mods for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in launch parameters (-mod=, -serverMod=).
          items:
            $ref: './local-mods.yaml#/ServerLocalModDto'
        activeDLCs:
          type: array
          description: >
            Active Creator DLCs for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in launch parameters.
          items:
            $ref: './mods.yaml#/CreatorDlcDto'
        difficultySettings:
          $ref: '#/Arma3DifficultySettingsDto'
        networkSettings:
          $ref: '#/Arma3NetworkSettingsDto'
        targetHeadlessClientsCount:
          type: integer
          minimum: 0
          default: 0

DayZServerDto:
  allOf:
    - $ref: '#/BaseServerDto'
    - type: object
      properties:
        clientFilePatching:
          type: boolean
        persistent:
          type: boolean
        verifySignatures:
          type: boolean
        vonEnabled:
          type: boolean
        forceSameBuild:
          type: boolean
        thirdPersonViewEnabled:
          type: boolean
        crosshairEnabled:
          type: boolean
        respawnTime:
          type: integer
          minimum: 0
        timeAcceleration:
          type: number
          format: double
          minimum: 0.1
          maximum: 64
        nightTimeAcceleration:
          type: number
          format: double
          minimum: 0.1
          maximum: 64
        activeMods:
          type: array
          description: >
            Active mods for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in launch parameters (-mod=, -serverMod=).
          items:
            $ref: '#/ServerWorkshopModDto'
        activeLocalMods:
          type: array
          description: >
            Active local mods for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in launch parameters (-mod=, -serverMod=).
          items:
            $ref: './local-mods.yaml#/ServerLocalModDto'

ReforgerServerDto:
  allOf:
    - $ref: '#/BaseServerDto'
    - type: object
      properties:
        scenarioId:
          type: string
          minLength: 1
        battlEye:
          type: boolean
        thirdPersonViewEnabled:
          type: boolean
        activeMods:
          type: array
          description: >
            Active mods for this server. Array order is significant: index 0 is loaded first.
            The order is persisted and reflected in the server configuration.
          items:
            $ref: '#/ReforgerModDto'

ServersDto:
  type: object
  properties:
    servers:
      type: array
      items:
        $ref: '#/ServerDto'

ServerInstanceInfoDto:
  type: object
  properties:
    alive:
      type: boolean
    startedAt:
      type: string
    playersOnline:
      type: integer
    maxPlayers:
      type: integer
    version:
      type: string
    map:
      type: string
    description:
      type: string
    headlessClientsCount:
      type: integer

ServerWorkshopModDto:
  type: object
  required: [id, name, position]
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    position:
      type: integer

ReforgerModDto:
  type: object
  required: [name, id]
  properties:
    id:
      type: string
      minLength: 1
    name:
      type: string
      minLength: 1

Arma3DifficultySettingsDto:
  type: object
  properties:
    groupIndicators:
      type: integer
      minimum: 0
      maximum: 2
    friendlyTags:
      type: integer
      minimum: 0
      maximum: 2
    enemyTags:
      type: integer
      minimum: 0
      maximum: 2
    detectedMines:
      type: integer
      minimum: 0
      maximum: 2
    commands:
      type: integer
      minimum: 0
      maximum: 2
    waypoints:
      type: integer
      minimum: 0
      maximum: 2
    weaponInfo:
      type: integer
      minimum: 0
      maximum: 2
    stanceIndicator:
      type: integer
      minimum: 0
      maximum: 2
    thirdPersonView:
      type: integer
      minimum: 0
      maximum: 2
    tacticalPing:
      type: integer
      minimum: 0
      maximum: 3
    aiLevelPreset:
      type: integer
      minimum: 0
      maximum: 3
    reducedDamage:
      type: boolean
    staminaBar:
      type: boolean
    weaponCrosshair:
      type: boolean
    visionAid:
      type: boolean
    scoreTable:
      type: boolean
    deathMessages:
      type: boolean
    vonID:
      type: boolean
    mapContent:
      type: boolean
    autoReport:
      type: boolean
    cameraShake:
      type: boolean
    skillAI:
      type: number
      format: double
      minimum: 0
      maximum: 1
    precisionAI:
      type: number
      format: double
      minimum: 0
      maximum: 1

Arma3NetworkSettingsDto:
  type: object
  properties:
    maxMessagesSend:
      type: integer
    maxSizeGuaranteed:
      type: integer
    maxSizeNonguaranteed:
      type: integer
    minBandwidth:
      type: integer
    maxBandwidth:
      type: integer
    minErrorToSend:
      type: number
      format: double
    minErrorToSendNear:
      type: number
      format: double
    maxPacketSize:
      type: integer
    maxCustomFileSize:
      type: integer

SeedConfigOverrideRequest:
  type: object
  required: [configKey, server]
  properties:
    configKey:
      type: string
      description: Config file key (e.g. DAYZ_SERVER_CFG)
    server:
      $ref: '#/ServerDto'

SetHeadlessClientsTargetRequest:
  type: object
  required: [targetHeadlessClientsCount]
  properties:
    targetHeadlessClientsCount:
      type: integer
      minimum: 0
