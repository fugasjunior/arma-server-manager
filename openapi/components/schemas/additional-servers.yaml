AdditionalServerDto:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    alive:
      type: boolean
    status:
      $ref: './common.yaml#/ServerStatus'
    startedAt:
      type: string
    imageUrl:
      type: string
    autoStart:
      type: boolean

AdditionalServersDto:
  type: object
  properties:
    servers:
      type: array
      items:
        $ref: '#/AdditionalServerDto'
