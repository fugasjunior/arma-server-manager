/scenarios:
  get:
    tags: [Scenarios]
    operationId: getArma3Scenarios
    summary: List all Arma 3 scenarios
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/scenarios.yaml#/Arma3ScenariosDto'
  post:
    tags: [Scenarios]
    operationId: uploadScenarios
    summary: Upload scenario files
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: array
                items:
                  type: string
                  format: binary
    responses:
      '200':
        description: OK

/scenarios/REFORGER:
  get:
    tags: [Scenarios]
    operationId: getReforgerScenarios
    summary: List all Reforger scenarios
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/scenarios.yaml#/ReforgerScenariosDto'

/scenarios/{name}:
  get:
    tags: [Scenarios]
    operationId: downloadScenario
    summary: Download a scenario file
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: OK
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      '404':
        $ref: '../components/responses.yaml#/ApiError'
  delete:
    tags: [Scenarios]
    operationId: deleteScenario
    summary: Delete a scenario
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: No Content
      '400':
        $ref: '../components/responses.yaml#/ApiError'
