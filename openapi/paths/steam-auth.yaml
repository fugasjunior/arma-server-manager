/config/auth:
  get:
    tags: [SteamAuth]
    operationId: getSteamAuth
    summary: Get current Steam auth credentials (username only)
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/steam-auth.yaml#/SteamAuthDto'
  delete:
    tags: [SteamAuth]
    operationId: clearSteamAuth
    summary: Clear Steam auth credentials
    responses:
      '204':
        description: No Content

/config/auth/status:
  get:
    tags: [SteamAuth]
    operationId: getSteamAuthStatus
    summary: Get Steam auth configuration and session status
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/steam-auth.yaml#/SteamAuthStatusDto'

/config/auth/login:
  post:
    tags: [SteamAuth]
    operationId: steamLogin
    summary: Perform a Steam login, optionally with a Steam Guard code
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/steam-auth.yaml#/SteamLoginRequestDto'
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/steam-auth.yaml#/SteamLoginResultDto'
      '500':
        $ref: '../components/responses.yaml#/ApiError'
