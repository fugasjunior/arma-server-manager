plugins {
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.3.21'
    id 'org.jetbrains.kotlin.plugin.spring' version '2.3.21'
    id 'org.jetbrains.kotlin.plugin.jpa' version '2.3.21'
    id 'org.flywaydb.flyway' version '11.14.1'
    id 'com.github.ben-manes.versions' version '0.51.0'
    id 'org.openapi.generator' version '7.12.0'
}

group = 'cz.forgottenempire'
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}
kotlin {
    jvmToolchain(25)
}

configurations {
    developmentOnly
    runtimeClasspath {
        extendsFrom developmentOnly
    }
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

tasks.register('copyWebApp', Copy) {
    dependsOn(':frontend:appNpmBuild')

    doFirst {
        delete "$rootDir/backend/build/resources/main/static"
    }

    from "$rootDir/frontend/build"
    into "$rootDir/backend/build/resources/main/static/."
}

/**
 * Skip frontend build in two cases:
 * 1. When running from IntelliJ IDEA (automatically sets idea.active=true)
 * 2. When explicitly requested by setting -DskipFrontendBuild=true JVM parameter
 *
 * Example usage:
 * - Running from command line: ./gradlew bootRun -DskipFrontendBuild=true
 * - Running from another IDE: Configure the run configuration to include -DskipFrontendBuild=true
 */
def isRunningFromIdea = System.getProperty("idea.active") == "true"
def skipFrontendBuild = System.getProperty("skipFrontendBuild") == "true"

if (!isRunningFromIdea && !skipFrontendBuild) {
    compileJava.dependsOn copyWebApp
    bootJar.dependsOn copyWebApp
    resolveMainClassName.dependsOn copyWebApp
    jar.dependsOn copyWebApp
} else {
    def reason = isRunningFromIdea ? "IntelliJ IDEA" : "skipFrontendBuild property"
    println "Skipping frontend build step (reason: $reason)"
}

dependencies {
    runtimeOnly project(':frontend')

    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'org.springframework.boot:spring-boot-starter-freemarker'
    implementation "commons-io:commons-io:2.22.0"
    implementation "com.auth0:java-jwt:4.2.2"
    implementation "com.ibasco.agql:agql-source-query:1.2.2"
    implementation "com.google.guava:guava:33.6.0-jre"
    implementation "org.mapstruct:mapstruct:1.6.3"
    implementation "org.jsoup:jsoup:1.22.2"
    implementation 'org.jetbrains.kotlin:kotlin-reflect'

    runtimeOnly 'org.springframework.boot:spring-boot-starter-flyway'
    runtimeOnly 'org.flywaydb:flyway-mysql'
    runtimeOnly 'org.springframework.boot:spring-boot-properties-migrator'
    runtimeOnly 'com.mysql:mysql-connector-j'

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    annotationProcessor "org.projectlombok:lombok:1.18.46"
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.testcontainers:junit-jupiter:1.20.4'
    testImplementation 'org.testcontainers:mysql:1.20.4'
    testImplementation 'io.rest-assured:rest-assured:5.5.0'
    testImplementation 'io.rest-assured:spring-mock-mvc:5.5.0'
    testImplementation 'org.awaitility:awaitility:4.2.2'
    testImplementation 'org.wiremock:wiremock-standalone:3.10.0'
    testImplementation 'com.fasterxml.jackson.core:jackson-databind'
    testCompileOnly "org.projectlombok:lombok:1.18.46"
    testAnnotationProcessor "org.projectlombok:lombok:1.18.46"

    compileOnly 'io.swagger.core.v3:swagger-annotations:2.2.28'
    compileOnly 'com.fasterxml.jackson.core:jackson-databind'
}

openApiGenerate {
    generatorName = 'spring'
    inputSpec = "$rootDir/openapi/openapi.yaml"
    outputDir = "$buildDir/generated/openapi"
    apiPackage = 'cz.forgottenempire.servermanager.api'
    modelPackage = 'cz.forgottenempire.servermanager.api.model'
    invokerPackage = 'cz.forgottenempire.servermanager.api.invoker'
    configOptions = [
        interfaceOnly          : 'true',
        useSpringBoot3         : 'true',
        useTags                : 'true',
        skipDefaultInterface   : 'true',
        openApiNullable        : 'false',
        useBeanValidation      : 'true',
        dateLibrary            : 'java8',
        useJakartaEe           : 'true',
        serializationLibrary   : 'jackson',
        enumUnknownDefaultCase : 'false',
    ]
    typeMappings = [
        'set': 'java.util.Set'
    ]
    importMappings = [
        'ServerType'       : 'cz.forgottenempire.servermanager.common.ServerType',
        'InstallationStatus': 'cz.forgottenempire.servermanager.common.InstallationStatus',
        'ErrorStatus'      : 'cz.forgottenempire.servermanager.steamcmd.ErrorStatus',
    ]
}

sourceSets {
    main {
        java {
            srcDir "$buildDir/generated/openapi/src/main/java"
        }
    }
}

compileJava.dependsOn tasks.openApiGenerate
compileKotlin.dependsOn tasks.openApiGenerate

bootJar {
    archiveFileName = 'app.jar'
}

test {
    useJUnitPlatform()
}

tasks.register('e2eApp', JavaExec) {
    dependsOn compileTestJava, processTestResources
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'cz.forgottenempire.servermanager.e2e.E2EApplication'
    jvmArgs '--enable-preview'
    description = 'Run backend with E2E test profile (fake SteamCMD, fake processes, Testcontainers MySQL).'
    group = 'e2e'
}
