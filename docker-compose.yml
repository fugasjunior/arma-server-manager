services:
  db:
    image: mysql:8.3.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DB_NAME}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    ports:
      - "3306:3306"
    volumes:
      - armaservermanager-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    restart: always
    ports:
      - "8090:8080"

  armaservermanager:
    build: .
    restart: always
    # 'host' network mode is not available on Windows. If you need to run this image on Windows, you need to set up port mappings manually.
    network_mode: host
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    # uncomment when running on Windows and add additional ports according to your needs
    #    ports:
    #      - "8080:8080"
    #      - "2302-2305:2302-2305/udp"
    #      - "27016:27016/udp"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "${STORAGE_PATH}:/home/steam/armaservermanager/"
      - armaservermanager-config:/home/steam/config
      - armaservermanager-steam-config:/home/steam/Steam/config
    environment:
      - AUTH_USERNAME
      - AUTH_PASSWORD
      - SPRING_DATASOURCE_URL=${MYSQL_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - DATABASE_ENCRYPTION_SECRET
      - TZ=${TIMEZONE}
      # Optional: force the uid/gid the app runs as. Leave unset to auto-detect
      # from the owner of STORAGE_PATH. Only needed if that dir is root-owned.
      # - PUID=${PUID}
      # - PGID=${PGID}

volumes:
  armaservermanager-db:
  armaservermanager-config:
  armaservermanager-steam-config:
